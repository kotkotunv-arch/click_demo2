<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refreshing Breeze - リアルタイムデータモニター</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #eef7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Yu Gothic UI', sans-serif;
    }
    canvas {
      box-shadow: 0 15px 35px rgba(80, 120, 140, 0.15);
      border-radius: 16px;
    }
  </style>
</head>
<body>

<script type="module">
// Firebaseの読み込み
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebaseの設定情報を反映
const firebaseConfig = {
    apiKey: "AIzaSyCH9fcNnpgVnqBJeTNuG11QPr8uTn28aMc",
    authDomain: "click-4d2a0.firebaseapp.com",
    projectId: "click-4d2a0",
    storageBucket: "click-4d2a0.firebasestorage.app",
    messagingSenderId: "55099695962",
    appId: "1:55099695962:web:9ea37f3aa992b378e24963",
    measurementId: "G-6XJBR4H4QK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dbTotalClicks = 0;       
let displayTotalClicks = 0;  
let lastActiveTime = 0;      
let particles = [];

function setup() {
  createCanvas(600, 400);
  noStroke();

  // ★Firebaseのリアルタイムリスナーを設置
  onSnapshot(doc(db, "game_data", "clicks"), (doc) => {
    if (doc.exists()) {
      dbTotalClicks = doc.data().total;
      lastActiveTime = millis();
      // データ更新時に弾ける爽やかなパーティクルを生成
      for(let i=0; i<15; i++) {
        particles.push(new DataParticle(width/2, height/2 + 20));
      }
    }
  });
}

function draw() {
  drawBackground();

  // 数値をなめらかにアニメーションさせて加算
  displayTotalClicks = lerp(displayTotalClicks, dbTotalClicks, 0.1);

  // タイトル表示
  textAlign(CENTER, TOP);
  fill(60, 100, 120);
  textSize(20);
  text("地域共創デザイン実習 - ユーザー行動分析", width / 2, 40);
  
  textSize(14);
  fill(100, 140, 160);
  text("REAL-TIME CLICK COUNTER", width / 2, 70);

  // 中央のデータ表示カード
  drawDataCard();

  // パーティクルの描画
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();
    if (particles[i].isDead()) particles.splice(i, 1);
  }
}

function drawBackground() {
  for (let i = 0; i <= height; i++) {
    let inter = map(i, 0, height, 0, 1);
    let c1 = color(240, 255, 252);
    let c2 = color(210, 238, 245);
    stroke(lerpColor(c1, c2, inter));
    line(0, i, width, i);
  }
}

function drawDataCard() {
  push();
  translate(width/2, height/2 + 20);
  
  // データ受信時のポップアップエフェクト
  let timeDiff = millis() - lastActiveTime;
  let scaleFactor = 1.0 + sin(timeDiff * 0.05) * 0.05 * exp(-timeDiff * 0.005);
  if (scaleFactor < 1.0 || isNaN(scaleFactor)) scaleFactor = 1.0;
  scale(scaleFactor);

  // カード本体
  noStroke();
  fill(255, 255, 255, 180);
  rect(-180, -70, 360, 140, 12);
  
  // 外枠
  stroke(150, 230, 220, 150);
  strokeWeight(2);
  noFill();
  rect(-180, -70, 360, 140, 12);

  // カウンターテキスト
  noStroke();
  fill(40, 80, 100);
  textAlign(CENTER, CENTER);
  textSize(54);
  text(Math.round(displayTotalClicks).toLocaleString() + " CLICKS", 0, 0);
  pop();
}

class DataParticle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    let angle = random(TWO_PI);
    let speed = random(2, 7);
    this.vx = cos(angle) * speed;
    this.vy = sin(angle) * speed;
    this.alpha = 255;
    this.size = random(6, 12);
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.alpha -= 5;
  }
  display() {
    noStroke();
    fill(80, 200, 220, this.alpha);
    ellipse(this.x, this.y, this.size);
  }
  isDead() { return this.alpha <= 0; }
}

// p5.jsのシステムに明示的に登録して起動する処理
window.setup = setup;
window.draw = draw;
</script>

</body>
</html>
