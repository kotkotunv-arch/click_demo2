<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refreshing Breeze - リアルタイムデータモニター</title>
  <!-- p5.jsの読み込み -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #eef7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Yu Gothic UI', sans-serif;
    }
    canvas {
      box-shadow: 0 15px 35px rgba(80, 120, 140, 0.15);
      border-radius: 16px;
    }
  </style>
</head>
<body>

<script type="module">
// Firebaseの読み込み
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { initializeFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebaseの設定情報
// Firebaseの設定情報（正しいプロジェクトIDに修正しました！）
  const firebaseConfig = {
      apiKey: "AIzaSyCH9fcNnpgVnqBJeTNuG11QPr8uTn28aMc",
      authDomain: "click-d8d30.firebaseapp.com",
      projectId: "click-d8d30",
      storageBucket: "click-d8d30.firebasestorage.app",
      messagingSenderId: "55099695962",
      appId: "1:55099695962:web:9ea37f3aa992b378e24963",
      measurementId: "G-6XJBR4H4QK"
  };

const app = initializeApp(firebaseConfig);

// データベースID「click」を指定
const db = initializeFirestore(app, {
  databaseId: 'click'
});

// データの管理用変数
let dbTotalClicks = 0;       
let displayTotalClicks = 0;  
let lastActiveTime = 0;      
let particles = [];

// --- p5.jsを安全に起動するための設定（インスタンスモード） ---
const sketch = (p) => {

  p.setup = () => {
    p.createCanvas(600, 400);
    p.noStroke();

    // ★宛先をゲームと完全に同じ「click」に変更しました！
    onSnapshot(doc(db, "game_data", "click"), (docSnapshot) => {
      if (docSnapshot.exists()) {
        dbTotalClicks = docSnapshot.data().total;
        lastActiveTime = p.millis();
        // データ更新時に弾ける爽やかなパーティクルを生成
        for(let i=0; i<15; i++) {
          particles.push(new DataParticle(p.width/2, p.height/2 + 20));
        }
      }
    });
  };

  p.draw = () => {
    drawBackground();

    // 数値をなめらかにアニメーションさせて加算
    displayTotalClicks = p.lerp(displayTotalClicks, dbTotalClicks, 0.1);

    // タイトル表示
    p.textAlign(p.CENTER, p.TOP);
    p.fill(60, 100, 120);
    p.textSize(20);
    p.text("地域共創デザイン実習 - ユーザー行動分析", p.width / 2, 40);
    
    p.textSize(14);
    p.fill(100, 140, 160);
    p.text("REAL-TIME CLICK COUNTER", p.width / 2, 70);

    // 中央のデータ表示カード
    drawDataCard();

    // パーティクルの描画
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].display();
      if (particles[i].isDead()) particles.splice(i, 1);
    }
  };

  function drawBackground() {
    for (let i = 0; i <= p.height; i++) {
      let inter = p.map(i, 0, p.height, 0, 1);
      let c1 = p.color(240, 255, 252);
      let c2 = p.color(210, 238, 245);
      p.stroke(p.lerpColor(c1, c2, inter));
      p.line(0, i, p.width, i);
    }
  }

  function drawDataCard() {
    p.push();
    p.translate(p.width/2, p.height/2 + 20);
    
    // データ受信時のポップアップエフェクト
    let timeDiff = p.millis() - lastActiveTime;
    let scaleFactor = 1.0 + p.sin(timeDiff * 0.05) * 0.05 * p.exp(-timeDiff * 0.005);
    if (scaleFactor < 1.0 || isNaN(scaleFactor)) scaleFactor = 1.0;
    p.scale(scaleFactor);

    // カード本体
    p.noStroke();
    p.fill(255, 255, 255, 180);
    p.rect(-180, -70, 360, 140, 12);
    
    // 外枠
    p.stroke(150, 230, 220, 150);
    p.strokeWeight(2);
    p.noFill();
    p.rect(-180, -70, 360, 140, 12);

    // カウンターテキスト
    p.noStroke();
    p.fill(40, 80, 100);
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(54);
    p.text(Math.round(displayTotalClicks).toLocaleString() + " CLICKS", 0, 0);
    p.pop();
  }

  class DataParticle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      let angle = p.random(p.TWO_PI);
      let speed = p.random(2, 7);
      this.vx = p.cos(angle) * speed;
      this.vy = p.sin(angle) * speed;
      this.alpha = 255;
      this.size = p.random(6, 12);
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.96;
      this.vy *= 0.96;
      this.alpha -= 5;
    }
    display() {
      p.noStroke();
      p.fill(80, 200, 220, this.alpha);
      p.ellipse(this.x, this.y, this.size);
    }
    isDead() { return this.alpha <= 0; }
  }
};

new p5(sketch);
</script>

</body>
</html>
